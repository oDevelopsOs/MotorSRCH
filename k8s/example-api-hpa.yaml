# Ejemplo mínimo: API + HPA. Adaptar imagen, secretos, probes y recursos antes de aplicar.
# kubectl apply -f example-api-hpa.yaml
#
# Requiere Metrics Server para CPU: kubectl top pods

apiVersion: apps/v1
kind: Deployment
metadata:
  name: motor-api
  labels:
    app: motor-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: motor-api
  template:
    metadata:
      labels:
        app: motor-api
    spec:
      containers:
        - name: api
          image: your-registry/motordebusqueda-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: MEILI_URL
              value: "http://meilisearch:7700"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              cpu: "500m"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: motor-api
spec:
  selector:
    app: motor-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: motor-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: motor-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
